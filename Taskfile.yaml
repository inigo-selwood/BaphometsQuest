version: '3'

tasks:
  build:
    desc: Build an optimised release and bundle release resources
    cmds:
      - task --taskfile configuration/task/build.yaml release

  format:
    desc: Format source and resource files
    cmds:
      - task --taskfile configuration/task/formatting.yaml format

  test:
    desc: Build and run unit tests
    cmds:
      - task --taskfile configuration/task/build.yaml test

  coverage:
    desc: Build tests and generate a coverage report
    cmds:
      - task --taskfile configuration/task/build.yaml coverage
      - open build/coverage/html/index.html

  run:
    desc: Build and run the game, forwarding arguments after --
    cmds:
      - task --taskfile configuration/task/build.yaml debug
      - ./build/debug/baphomets_quest {{.CLI_ARGS}}

  docs:
    desc: Build and open Doxygen documentation
    cmds:
      - task --taskfile configuration/task/documentation.yaml build
      - open build/docs/html/index.html

  clean:
    desc: Remove generated build and tooling output
    cmds:
      - task --taskfile configuration/task/build.yaml clean
      - task --taskfile configuration/task/formatting.yaml clean
