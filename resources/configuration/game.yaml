window:
    title: Baphomet's Quest
    logical-width: 160
    logical-height: 144
    scale: 4
    resizable: false

render:
    scale-quality: nearest
    clear-colour: "#000000"

audio:
    frequency: 44100
    channels: 2
    chunk-size: 2048

frame-rate:
    target: 24
    minimum: 12
    step: 1
    overrun-tolerance-ms: 2
    underrun-headroom-ms: 4
    overrun-hysteresis-frames: 12
    underrun-hysteresis-frames: 90
