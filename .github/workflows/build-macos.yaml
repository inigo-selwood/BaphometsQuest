name: Build macOS

on:
  workflow_dispatch:

  schedule:
    - cron: '0 6 * * 1'

permissions:
  actions: write
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    uses: ./.github/workflows/build-platform.yaml

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            artifact: baphomets-quest-macos-apple-silicon
            runner: macos-15
          - name: macOS Intel
            artifact: baphomets-quest-macos-intel
            runner: macos-15-intel

    with:
      artifact: ${{ matrix.artifact }}
      name: ${{ matrix.name }}
      runner: ${{ matrix.runner }}
