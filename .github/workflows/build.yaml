name: Build

on:
  # Manual runs always perform a full build, even if the scheduled cache says
  # nothing changed
  workflow_dispatch:

  # Scheduled builds are intentionally weekly rather than push-triggered so we
  # keep confidence in platform builds without spending minutes on every commit
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: write
  actions: write

jobs:
  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Coverage uses the Linux Clang toolchain so the badge can be refreshed
      # cheaply once per workflow run without waiting on every platform matrix
      - name: Set up Task
        uses: arduino/setup-task@v2

      # Keep this dependency set aligned with the Linux platform build
      # llvm supplies llvm-cov and llvm-profdata for source coverage reports
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes \
            build-essential \
            catch2 \
            clang \
            cmake \
            imagemagick \
            llvm \
            libcli11-dev \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libspdlog-dev \
            libtinyxml2-dev \
            libx11-dev \
            libyaml-cpp-dev \
            ninja-build \
            pkg-config

      - name: Build coverage
        run: task coverage

      # The README badge reads this committed Shields endpoint from main
      # Only main updates the badge; other refs still run coverage without push
      - name: Update coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet documentation/badges/coverage.json
          then
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add documentation/badges/coverage.json
          git commit -m "Update coverage badge"
          git push

  build:
    name: ${{ matrix.name }}
    uses: ./.github/workflows/build-platform.yaml

    # Each platform uses its native runner so package discovery, icons, bundles,
    # and platform-specific CMake branches are tested where they actually run
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            artifact: baphomets-quest-linux-x64
            msystem: ''
            package_prefix: ''
          - name: macOS Apple Silicon
            runner: macos-15
            artifact: baphomets-quest-macos-apple-silicon
            msystem: ''
            package_prefix: ''
          - name: macOS Intel
            runner: macos-15-intel
            artifact: baphomets-quest-macos-intel
            msystem: ''
            package_prefix: ''
          - name: Windows x64
            runner: windows-latest
            artifact: baphomets-quest-windows-x64
            msystem: UCRT64
            package_prefix: mingw-w64-ucrt-x86_64
          - name: Windows x86
            runner: windows-latest
            artifact: baphomets-quest-windows-x86
            msystem: MINGW32
            package_prefix: mingw-w64-i686

    with:
      artifact: ${{ matrix.artifact }}
      msystem: ${{ matrix.msystem }}
      name: ${{ matrix.name }}
      package_prefix: ${{ matrix.package_prefix }}
      runner: ${{ matrix.runner }}
