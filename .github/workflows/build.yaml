name: Build

on:
  # Manual runs always perform a full build, even if the scheduled cache says
  # nothing changed
  workflow_dispatch:

  # Scheduled builds are intentionally weekly rather than push-triggered so we
  # keep confidence in platform builds without spending minutes on every commit
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: ${{ matrix.name }}
    uses: ./.github/workflows/build-platform.yaml

    # Each platform uses its native runner so package discovery, icons, bundles,
    # and platform-specific CMake branches are tested where they actually run
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux
            runner: ubuntu-latest
            artifact: baphomets-quest-linux-x64
            msystem: ''
            package_prefix: ''
          - name: macOS Apple Silicon
            runner: macos-15
            artifact: baphomets-quest-macos-apple-silicon
            msystem: ''
            package_prefix: ''
          - name: macOS Intel
            runner: macos-15-intel
            artifact: baphomets-quest-macos-intel
            msystem: ''
            package_prefix: ''
          - name: Windows x64
            runner: windows-latest
            artifact: baphomets-quest-windows-x64
            msystem: UCRT64
            package_prefix: mingw-w64-ucrt-x86_64
          - name: Windows x86
            runner: windows-latest
            artifact: baphomets-quest-windows-x86
            msystem: MINGW32
            package_prefix: mingw-w64-i686

    with:
      artifact: ${{ matrix.artifact }}
      msystem: ${{ matrix.msystem }}
      name: ${{ matrix.name }}
      package_prefix: ${{ matrix.package_prefix }}
      runner: ${{ matrix.runner }}
