version: '3'

tasks:
  format:
    desc: Format source and resource files
    cmds:
      - find source -name '*.cpp' -o -name '*.hpp' | xargs clang-format -i
      - |
        find resources -name '*.xml' -type f | while read -r file; do
          tidy -config .tidyrc -m "$file"
        done

  build-debug:
    desc: Configure and build the debug game
    method: checksum
    sources:
      - CMakeLists.txt
      - source/**/*.cpp
      - source/**/*.hpp
    generates:
      - build/debug/build.ninja
      - build/debug/baphomets_quest
      - build/debug/.task-build-debug.stamp
    cmds:
      - >-
        cmake -S . -B build/debug
        -G Ninja
        -DCMAKE_MAKE_PROGRAM=/opt/homebrew/bin/ninja
      - cmake --build build/debug --parallel
      - cmake -E touch build/debug/.task-build-debug.stamp

  build-release:
    desc: Build an optimised release and bundle release resources
    method: checksum
    sources:
      - CMakeLists.txt
      - source/**/*.cpp
      - source/**/*.hpp
      - resources/**/*
    generates:
      - build/release/build.ninja
      - build/release/baphomets_quest
      - build/release/.task-build-release.stamp
    cmds:
      - >-
        cmake -S . -B build/release
        -G Ninja
        -DCMAKE_MAKE_PROGRAM=/opt/homebrew/bin/ninja
        -DCMAKE_BUILD_TYPE=Release
        -DBAPHOMETS_QUEST_RELEASE_OPTIMISATION=ON
      - >-
        cmake --build build/release
        --target bundle_resources
        --config Release
        --parallel
      - cmake -E touch build/release/.task-build-release.stamp

  run:
    desc: Build and run the game, forwarding arguments after --
    deps:
      - build-debug
    cmds:
      - ./build/debug/baphomets_quest {{.CLI_ARGS}}

  clean:
    desc: Remove generated build output
    cmds:
      - rm -rf build
