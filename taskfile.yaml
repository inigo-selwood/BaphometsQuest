version: '3'

tasks:
  build:
    desc: Configure and build the game
    sources:
      - CMakeLists.txt
      - source/**/*.cpp
      - source/**/*.hpp
      - resources/**/*
    generates:
      - build/untitled_game
      - build/resources
    cmds:
      - cmake -S . -B build
      - cmake --build build

  clean:
    desc: Remove generated build output
    cmds:
      - rm -rf build

  debug:
    desc: Build and run the game with debug logging
    deps:
      - build
    cmds:
      - ./build/untitled_game debug

  format:
    desc: Format source and resource files
    cmds:
      - find source -name '*.cpp' -o -name '*.hpp' | xargs clang-format -i
      - |
        find resources -name '*.xml' -type f | while read -r file; do
          tidy -config .tidyrc -m "$file"
        done

  help:
    desc: Build and show app command help
    deps:
      - build
    cmds:
      - ./build/untitled_game --help

  run:
    desc: Build and run the game
    deps:
      - build
    cmds:
      - ./build/untitled_game

  tilemap:
    desc: Build and run the tilemap editor
    deps:
      - build
    cmds:
      - ./build/untitled_game tilemap

  tileset:
    desc: Build and run the tileset editor
    deps:
      - build
    cmds:
      - ./build/untitled_game tileset
